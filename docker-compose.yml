version: '3.8'

services:
  auth-service:
    build: .
    container_name: auth-resultspro
    restart: always
    ports:
      - "7000:7000"
    env_file: .env
    volumes:
      # Map the host's central DB directory to the container
      - /var/lib/auth_resultspro/data:/app/data
    environment:
      - DB_PATH=/app/data/auth.db
      - PORT=7000
